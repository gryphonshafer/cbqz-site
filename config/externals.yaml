---
dart_sass:
    dest: local/externals/dart_sass
google_fonts:
    dest: static/externals/google_fonts
    fonts:
        'Poppins':
            variants:
                - 200
                - 200italic
                - regular
                - italic
                - 700
                - 700italic
            subsets:
                - latin
                - latin-ext
            formats:
                - woff2
                - woff
                - ttf
    icons:
        types:
            - 'Material Symbols Outlined'
        formats:
            - woff2
            - woff
vue:
    dest: static/externals/vue
    libs:
        vue/dist/vue.global.js     : vue.global.js
        vue/dist/vue.global.prod.js: vue.global.prod.js
